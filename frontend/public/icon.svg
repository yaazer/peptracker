<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Needle tip -->
  <line x1="52" y1="32" x2="62" y2="32" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <!-- Barrel -->
  <rect x="18" y="24" width="34" height="16" rx="4" stroke="#3b82f6" stroke-width="3"/>
  <!-- Plunger rod -->
  <line x1="6" y1="32" x2="18" y2="32" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <!-- Plunger handle (T-bar) -->
  <line x1="4" y1="26" x2="4" y2="38" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Plunger flange (barrel end cap) -->
  <line x1="52" y1="26" x2="52" y2="38" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <!-- Dose marker lines inside barrel -->
  <line x1="32" y1="26" x2="32" y2="30" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="26" x2="40" y2="30" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
