services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - peptracker_db:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/peptracker.db
      SECRET_KEY: "change-me-in-production"
      REGISTRATION_ENABLED: "true"
      COOKIE_SECURE: "false"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  peptracker_db:
