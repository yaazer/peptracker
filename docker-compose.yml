services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - peptracker_db:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/peptracker.db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  peptracker_db:
